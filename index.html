      .mgr-content { flex: 1; overflow-y: auto; padding: 12px 12px 60px; }

function tx(lang, key) { return (T[lang]||T.en)[key]||key; }

function todayStr() {
  const d=new Date(), y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function formatDateTime(ts) {
  if (!ts) return '—';
  try {
    const d=new Date(ts);
    if (isNaN(d.getTime())) return ts;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let h=d.getHours(), mins=String(d.getMinutes()).padStart(2,'0');
    const ampm=h>=12?'PM':'AM'; h=h%12||12;
    return `${months[d.getMonth()]} ${d.getDate()} · ${h}:${mins} ${ampm}`;
  } catch { return ts; }
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const parts=dateStr.split('-');
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(parts[1],10)-1]} ${parseInt(parts[2],10)}`;
  } catch { return dateStr; }
}

function initPressData(goals, lastReport) {
  return PRESSES.map(p => {
    let operatorId='', operatorName='', operatorStamp='', moldNumber='';
    if (lastReport && lastReport.pressData) {
      const lp=lastReport.pressData.find(x=>x.pressNumber===p);
      if (lp) { operatorId=lp.operatorId||''; operatorName=lp.operatorName||''; operatorStamp=lp.operatorStamp||''; moldNumber=lp.moldNumber||''; }
    }
    return { pressNumber:p, operatorId, operatorName, operatorStamp,
      good:'', scrap:'', goal:String(goals[p]!=null?goals[p]:100),
      notes:'', hasIssue:false, isRunning:true, notRunningReason:'', moldNumber };
  });
}

function calcHit(good, goal) {
  const g=parseInt(good,10), gl=parseInt(goal,10);
  if (!gl||isNaN(g)||g===0) return null;
  return Math.round((g/gl)*100);
}

function generatePassdown(pressData) {
  let lines='Molding -\n  (Good / Scrap / Goal)';
  (pressData||[]).forEach(p => {
    const g=p.isRunning?(parseInt(p.good||0,10)):0, sc=p.isRunning?(parseInt(p.scrap||0,10)):0, gl=parseInt(p.goal||0,10);
    let line=`${p.pressNumber} - ( ${g} / ${sc} / ${gl} )`;
    if (!p.isRunning&&p.notRunningReason) line+=` ${p.notRunningReason.toLowerCase()}`;
    if (p.notes) line+=` — ${p.notes}`;
    lines+=`\n\n${line}`;
  });
  return lines;
}

async function gasCall(action, payload={}) {
  if (GAS_URL==='YOUR_GAS_DEPLOYMENT_URL_HERE') throw new Error('GAS_URL not configured.');
  const res=await fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action,...payload})});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function hitHexColor(h) { return h>=90?'#1e7e34':h>=70?'#d6820a':'#C8102E'; }
function hitClass(h)    { return h>=90?'hit-good':h>=70?'hit-warn':'hit-bad'; }

function getDateRange(period) {
  const now=new Date(), dow=now.getDay(), back=dow===0?6:dow-1;
  if (period==='week') {
    const mon=new Date(now); mon.setDate(now.getDate()-back); mon.setHours(0,0,0,0);
    return { start:mon.toISOString(), end:now.toISOString() };
  }
  if (period==='lastWeek') {
    const thisMon=new Date(now); thisMon.setDate(now.getDate()-back); thisMon.setHours(0,0,0,0);
    const lastMon=new Date(thisMon); lastMon.setDate(thisMon.getDate()-7);
    const lastSun=new Date(thisMon); lastSun.setMilliseconds(-1);
    return { start:lastMon.toISOString(), end:lastSun.toISOString() };
  }
  if (period==='month') {
    const start=new Date(now.getFullYear(),now.getMonth(),1);
    return { start:start.toISOString(), end:now.toISOString() };
  }
  if (period==='all') return { start:new Date(2020,0,1).toISOString(), end:now.toISOString() };
  return { start:new Date(2020,0,1).toISOString(), end:now.toISOString() };
}

function getMondayStr(dateStr) {
  try {
    const d=new Date(dateStr+'T12:00:00'), dow=d.getDay(), back=dow===0?6:dow-1;
    d.setDate(d.getDate()-back);
    return d.toISOString().split('T')[0];
  } catch { return dateStr; }
}

function calcMolderStats(operatorName, reports) {
  const nightMap={}, pressMap={}, weekMap={};
  reports.forEach(r => {
    let nGood=0, nGoal=0, hasIssue=false;
    (r.pressData||[]).forEach(p => {
      if (p.operatorName!==operatorName||!p.isRunning) return;
      const g=parseInt(p.good||0,10), gl=parseInt(p.goal||0,10);
      if (!gl) return;
      nGood+=g; nGoal+=gl;
      if (p.hasIssue) hasIssue=true;
      if (!pressMap[p.pressNumber]) pressMap[p.pressNumber]={good:0,goal:0,nights:0,issues:0,molds:[]};
      pressMap[p.pressNumber].good+=g; pressMap[p.pressNumber].goal+=gl; pressMap[p.pressNumber].nights++;
      if (p.hasIssue) pressMap[p.pressNumber].issues++;
      if (p.moldNumber) pressMap[p.pressNumber].molds.push(p.moldNumber);
    });
    if (nGoal>0) {
      nightMap[r.date]={good:nGood,goal:nGoal,hit:Math.round((nGood/nGoal)*100),hasIssue};
      const wk=getMondayStr(r.date);
      if (!weekMap[wk]) weekMap[wk]={good:0,goal:0,nights:0};
      weekMap[wk].good+=nGood; weekMap[wk].goal+=nGoal; weekMap[wk].nights++;
    }
  });
  const nights=Object.entries(nightMap).map(([date,d])=>({date,...d})).sort((a,b)=>a.date.localeCompare(b.date));
  const totalGood=nights.reduce((s,n)=>s+n.good,0), totalGoal=nights.reduce((s,n)=>s+n.goal,0);
  const avgHit=totalGoal>0?Math.round((totalGood/totalGoal)*100):null;
  const issueNights=nights.filter(n=>n.hasIssue).length;
  const issueRate=nights.length>0?Math.round((issueNights/nights.length)*100):0;
  const pressBreakdown=Object.entries(pressMap).map(([press,d])=>({press,hit:Math.round((d.good/d.goal)*100),nights:d.nights,issues:d.issues,latestMold:d.molds[d.molds.length-1]||''})).sort((a,b)=>b.hit-a.hit);
  const weeklySummary=Object.entries(weekMap).map(([week,d])=>({week,hit:Math.round((d.good/d.goal)*100),good:d.good,goal:d.goal,nights:d.nights})).sort((a,b)=>b.week.localeCompare(a.week));
  const lastThree=nights.slice(-3);
  const isOnFire=lastThree.length>=3&&lastThree.every(n=>n.hit>=95);
  return { nights, avgHit, issueRate, pressBreakdown, weeklySummary, isOnFire, isConcern:avgHit!==null&&avgHit<75, totalNights:nights.length };
}

function getMolderWeekStatus(operatorName, reports) {
  let totalGood=0, totalGoal=0;
  const nights=[];
  reports.forEach(r => {
    let nGood=0, nGoal=0, hasIssue=false;
    (r.pressData||[]).forEach(p => {
      if (p.operatorName!==operatorName||!p.isRunning) return;
      const g=parseInt(p.good||0,10), gl=parseInt(p.goal||0,10);
      nGood+=g; nGoal+=gl; if (p.hasIssue) hasIssue=true;
    });
    if (nGoal>0) { totalGood+=nGood; totalGoal+=nGoal; nights.push({date:r.date,good:nGood,goal:nGoal,hit:Math.round((nGood/nGoal)*100),hasIssue}); }
  });
  nights.sort((a,b)=>a.date.localeCompare(b.date));
  const weekAvg=totalGoal>0?Math.round((totalGood/totalGoal)*100):null;
  const lastThree=nights.slice(-3);
  const isOnFire=lastThree.length>=3&&lastThree.every(n=>n.hit>=95);
  return { weekAvg, isConcern:weekAvg!==null&&weekAvg<75, isOnFire, nightCount:nights.length };
}

function useIsDesktop() {
  const [v,setV]=useState(window.innerWidth>=768);
  useEffect(()=>{ const h=()=>setV(window.innerWidth>=768); window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h); },[]);
  return v;
}

function PressBarChart({ reports }) {
  const pressData={};
  PRESSES.forEach(p=>{ pressData[p]={good:0,goal:0}; });
  reports.forEach(r=>{ (r.pressData||[]).forEach(p=>{ if (!p.isRunning||!pressData[p.pressNumber]) return; pressData[p.pressNumber].good+=parseInt(p.good||0,10); pressData[p.pressNumber].goal+=parseInt(p.goal||0,10); }); });
  const maxVal=Math.max(...Object.values(pressData).map(d=>d.goal),1);
  const chartH=110, barW=28, groupW=44, leftPad=28, topPad=22, bottomPad=22;
  const totalW=leftPad+PRESSES.length*groupW+8;
  return (
    <div style={{overflowX:'auto',marginBottom:4}}>
      <svg viewBox={`0 0 ${totalW} ${chartH+topPad+bottomPad}`} style={{minWidth:totalW,width:'100%',height:chartH+topPad+bottomPad,display:'block'}}>
        {[0,25,50,75,100].map(pct=>{ const y=topPad+chartH-(pct/100)*chartH; return <g key={pct}><line x1={leftPad} y1={y} x2={totalW-4} y2={y} stroke="#f0f0f0" strokeWidth="1"/><text x={leftPad-4} y={y+4} fontSize="8" textAnchor="end" fill="#bbb">{pct}</text></g>; })}
        {PRESSES.map((press,i)=>{ const d=pressData[press]; const hit=d.goal>0?Math.round((d.good/d.goal)*100):0; const goalH=d.goal>0?(d.goal/maxVal)*chartH:0; const goodH=d.goal>0?Math.min((d.good/maxVal)*chartH,chartH):0; const x=leftPad+i*groupW+(groupW-barW)/2; const color=hitHexColor(hit);
          return <g key={press}><rect x={x} y={topPad+chartH-goalH} width={barW} height={goalH} fill="none" stroke="#e0e0e0" strokeWidth="1.5" rx="2"/>{goodH>0&&<rect x={x} y={topPad+chartH-goodH} width={barW} height={goodH} fill={color} opacity="0.82" rx="2"/>}{d.goal>0&&<text x={x+barW/2} y={topPad+chartH-goalH-4} fontSize="8" textAnchor="middle" fill={color} fontWeight="bold">{hit}%</text>}<text x={x+barW/2} y={topPad+chartH+13} fontSize="8" textAnchor="middle" fill="#888">{press}</text></g>; })}
      </svg>
      <div style={{display:'flex',gap:16,justifyContent:'center',fontSize:11,color:'#aaa',marginTop:2}}>
        <span><span style={{display:'inline-block',width:12,height:10,background:'#e0e0e0',border:'1.5px solid #ccc',marginRight:4,verticalAlign:'middle'}}></span>Goal</span>

      </div>
    </div>
  );

function AddNoteModal({ lang, operatorName, author, onSave, onClose }) {
  const [noteText,setNoteText]=useState(''), [rating,setRating]=useState(0), [saving,setSaving]=useState(false), [err,setErr]=useState('');
  const save=async()=>{
    if (!noteText.trim()) return; setSaving(true); setErr('');
    try {
      const result=await gasCall('saveMolderNote',{operatorName,note:noteText.trim(),rating,author});
      if (result.success) { onSave({id:result.id,note:noteText.trim(),rating,timestamp:result.timestamp,author}); }
      else { setErr(result.error||tx(lang,'errOccurred')); setSaving(false); }
    } catch { setErr(tx(lang,'networkErr')); setSaving(false); }
  };
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div className="modal-title">{tx(lang,'addNote')} — {operatorName}</div>

// ============================================================
function MolderProfileDetail({ operator, lang, user, settings, onBack, onSettingsUpdate }) {
  const [period,setPeriod]=useState('week');
  const [reports,setReports]=useState([]);
  const [notes,setNotes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAddNote,setShowAddNote]=useState(false);
  const [profileVisible,setProfileVisible]=useState(settings[operator.name]?.profileVisible||false);
  const [copied,setCopied]=useState(false);
  const [msg,setMsg]=useState('');

  useEffect(()=>{ loadData(); },[period]);
  useEffect(()=>{ loadNotes(); },[]);

  const loadData=async()=>{
    setLoading(true);
    const {start,end}=getDateRange(period);
    try { const r=await gasCall('getReportsByRange',{startDate:start,endDate:end}); if(r.success) setReports(r.reports); } catch {}
    setLoading(false);
  };

  const loadNotes=async()=>{
    try { const r=await gasCall('getMolderNotes',{operatorName:operator.name}); if(r.success) setNotes(r.notes); } catch {}
  };

  const toggleVisibility=async(v)=>{
    setProfileVisible(v);
    try {
      await gasCall('setMolderVisibility',{operatorName:operator.name,visible:v});
      if (onSettingsUpdate) onSettingsUpdate(operator.name,{profileVisible:v});
    } catch {}
  };

  const deleteNote=async(noteId)=>{
    if (!window.confirm(tx(lang,'confirmDel'))) return;
    try {
      const r=await gasCall('deleteMolderNote',{noteId});
      if (r.success) setNotes(prev=>prev.filter(n=>n.id!==noteId));
    } catch {}
  };

  const stats=calcMolderStats(operator.name, reports);

  const exportProfile=async()=>{
    let text=`=== ${operator.name.toUpperCase()} — MOLDER PROFILE ===\n`;
    text+=`Stamp: #${operator.stampNumber} | Period: ${period} | Avg Hit: ${stats.avgHit!==null?stats.avgHit+'%':'N/A'}\n`;
    text+=`Nights Worked: ${stats.totalNights} | Issue Rate: ${stats.issueRate}%\n\n`;
    if (stats.pressBreakdown.length) {
      text+=`--- PRESS BREAKDOWN ---\n`;
      stats.pressBreakdown.forEach(p=>{ text+=`Press ${p.press}: ${p.hit}% (${p.nights} nights${p.latestMold?', Mold: '+p.latestMold:''})\n`; });
    }
    if (stats.weeklySummary.length) {
      text+=`\n--- WEEKLY SUMMARY ---\n`;
      stats.weeklySummary.forEach(w=>{ text+=`${tx(lang,'weekOf')} ${w.week}: ${w.hit}% — ${w.good} good / ${w.goal} goal (${w.nights} nights)\n`; });
    }
    if (notes.length) {
      text+=`\n--- 1:1 NOTES ---\n`;
      notes.forEach(n=>{ text+=`${formatDateTime(n.timestamp)} [${n.author}] ${n.rating>0?'★'.repeat(n.rating):''}\n${n.note}\n\n`; });
    }
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),2500); } catch {}
  };

  const periods=[['week',tx(lang,'thisWeek')],['lastWeek',tx(lang,'lastWeek')],['month',tx(lang,'thisMonth')],['all',tx(lang,'allTime')]];

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="app-header">
        <div><div className="header-title">{operator.name}</div><div className="header-sub">#{operator.stampNumber}</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="header-btn" onClick={exportProfile}>{copied?'✓':tx(lang,'exportProfile')}</button>
          <button className="header-btn" onClick={onBack}>{tx(lang,'back')}</button>
        </div>
      </div>

      <div className="scroll-area">
        {msg&&<div className="alert alert-info">{msg}</div>}

        <div className="period-filter">{periods.map(([k,l])=><button key={k} className={`period-btn${period===k?' active':''}`} onClick={()=>setPeriod(k)}>{l}</button>)}</div>

        {loading && <div className="loading-msg">{tx(lang,'loading')}</div>}
        {!loading && stats.totalNights===0 && <div className="empty-msg" style={{padding:24}}>{tx(lang,'noMolderData')}</div>}

        {!loading && stats.totalNights>0 && (
          <>
            {/* Status badges */}
            {(stats.isConcern||stats.isOnFire)&&(
              <div className={`alert-section ${stats.isConcern?'alert-section-concern':'alert-section-fire'}`} style={{marginBottom:11}}>
                <div className="alert-section-title" style={{color:stats.isConcern?'#C8102E':'#1e7e34'}}>
                  {stats.isConcern?`⚠ ${tx(lang,'concernFlag')} — below 75% average`:`🏆 ${tx(lang,'onFireFlag')} — 95%+ three nights in a row`}
                </div>
              </div>
            )}

            {/* Summary stats */}
            <div className="stat-row">
              <div className="stat-card"><div className="stat-big" style={{color:stats.avgHit!==null?hitHexColor(stats.avgHit):'#aaa'}}>{stats.avgHit!==null?stats.avgHit+'%':'—'}</div><div className="stat-label">{tx(lang,'avgHitRate')}</div></div>
              <div className="stat-card"><div className="stat-big">{stats.totalNights}</div><div className="stat-label">{tx(lang,'nightsWorked')}</div></div>
              <div className="stat-card"><div className="stat-big" style={{color:stats.issueRate>20?'#C8102E':stats.issueRate>10?'#d6820a':'#1e7e34'}}>{stats.issueRate}%</div><div className="stat-label">{tx(lang,'issueRate')}</div></div>
            </div>

            {/* Trend chart */}
            <div className="section-head">{tx(lang,'trendChart')}</div>
            <div className="card"><MolderTrendChart nights={stats.nights} lang={lang} /></div>

            {/* Press breakdown */}
            {stats.pressBreakdown.length>0&&(
              <>
                <div className="section-head">{tx(lang,'pressBrk')}</div>
                <div className="card">
                  {stats.pressBreakdown.map(p=>(
                    <div key={p.press} className="scorecard-row">
                      <div>
                        <div className="scorecard-name">{tx(lang,'press')} {p.press}</div>
                        <div style={{fontSize:11,color:'#aaa'}}>{p.nights} nights{p.latestMold?` · Mold: ${p.latestMold}`:''}</div>
                      </div>
                      <div className="scorecard-bar-wrap"><div className="scorecard-bar" style={{width:`${Math.min(p.hit,100)}%`,background:hitHexColor(p.hit)}}></div></div>
                      <div className="scorecard-pct" style={{color:hitHexColor(p.hit)}}>{p.hit}%</div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* Weekly summary */}
            {stats.weeklySummary.length>0&&(
              <>
                <div className="section-head">{tx(lang,'weeklySum')}</div>
                <div className="card" style={{overflowX:'auto'}}>
                  <table className="week-table">
                    <thead><tr><th>{tx(lang,'weekOf')}</th><th>Hit %</th><th>{tx(lang,'good')}</th><th>{tx(lang,'goal')}</th><th>Nights</th></tr></thead>
                    <tbody>
                      {stats.weeklySummary.map(w=>(
                        <tr key={w.week}>
                          <td>{formatDate(w.week)}</td>
                          <td style={{fontWeight:'bold',color:hitHexColor(w.hit)}}>{w.hit}%</td>
                          <td>{w.good.toLocaleString()}</td>
                          <td>{w.goal.toLocaleString()}</td>
                          <td>{w.nights}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}
          </>
        )}

        {/* Visibility toggle */}
        <div className="card">
          <div className="toggle-row">
            <span className="toggle-text" style={{fontSize:13}}>{tx(lang,'visibleToMolder')}</span>
            <Switch id="vis-sw" checked={profileVisible} onChange={toggleVisibility} />
          </div>
        </div>

        {/* 1:1 Notes */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div className="section-head" style={{marginBottom:0}}>{tx(lang,'oneOnOneNotes')}</div>
          <button className="btn-sm btn-sm-amber" onClick={()=>setShowAddNote(true)}>+ {tx(lang,'addNote')}</button>
        </div>

        {notes.length===0&&<div className="empty-msg" style={{padding:16,textAlign:'left',background:'white',borderRadius:10,marginBottom:11}}>{tx(lang,'noNotes')}</div>}
        {notes.map(n=>(
          <div key={n.id} className="note-card">
            <div className="note-meta">
              <div>
                <span style={{fontWeight:'bold',color:'#555'}}>{n.author}</span>
                <span style={{margin:'0 6px'}}>·</span>
                <span>{formatDateTime(n.timestamp)}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {n.rating>0&&<Stars value={n.rating} readOnly />}
                <button className="btn-sm btn-sm-danger" style={{padding:'3px 8px',fontSize:11}} onClick={()=>deleteNote(n.id)}>✕</button>
              </div>
            </div>
            <div className="note-text">{n.note}</div>
          </div>
        ))}
      </div>

      {showAddNote&&<AddNoteModal lang={lang} operatorName={operator.name} author={user.username}
        onSave={note=>{ setNotes(prev=>[note,...prev]); setShowAddNote(false); }}
        onClose={()=>setShowAddNote(false)} />}
    </div>
  );
}

// MOLDER PROFILES TAB (list view)
// ============================================================
function MolderProfilesTab({ lang, operators, user }) {
  const [selected,setSelected]=useState(null);
  const [weekReports,setWeekReports]=useState([]);
  const [settings,setSettings]=useState({});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([
      gasCall('getReportsByRange',getDateRange('week')),
      gasCall('getMolderSettings')
    ]).then(([rRes,sRes])=>{
      if (rRes.success) setWeekReports(rRes.reports);
      if (sRes.success) setSettings(sRes.settings);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const handleSettingsUpdate=(name,update)=>setSettings(prev=>({...prev,[name]:{...prev[name],...update}}));

  if (selected) {
    return <MolderProfileDetail operator={selected} lang={lang} user={user}
      settings={settings} onBack={()=>setSelected(null)} onSettingsUpdate={handleSettingsUpdate} />;
  }

  if (loading) return <div className="loading-msg">{tx(lang,'loading')}</div>;

  const operatorsWithStatus=operators.map(op=>{
    const status=getMolderWeekStatus(op.name,weekReports);
    const s=settings[op.name]||{};
    return {...op,...status,lastReviewed:s.lastReviewed};
  }).sort((a,b)=>{
    if (a.isConcern&&!b.isConcern) return -1;
    if (!a.isConcern&&b.isConcern) return 1;
    if (a.isOnFire&&!b.isOnFire) return -1;
    if (!a.isOnFire&&b.isOnFire) return 1;
    return a.name.localeCompare(b.name);
  });

  return (
    <>
      {operatorsWithStatus.map(op=>(
        <div key={op.id} className="card report-card" onClick={()=>setSelected(op)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:'bold',fontSize:15,display:'flex',alignItems:'center',gap:6}}>
                {op.name}
                {op.isOnFire&&<span className="molder-badge badge-fire">🏆</span>}
                {op.isConcern&&<span className="molder-badge badge-concern">⚠</span>}
              </div>
              <div style={{fontSize:12,color:'#888',marginTop:2}}>#{op.stampNumber} · {op.nightCount} {tx(lang,'nightsWorked')} this week</div>
              {op.lastReviewed&&<div style={{fontSize:11,color:'#bbb',marginTop:2}}>{tx(lang,'lastReviewed')}: {formatDateTime(op.lastReviewed)}</div>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              {op.weekAvg!==null&&<div style={{fontSize:22,fontWeight:'bold',color:hitHexColor(op.weekAvg)}}>{op.weekAvg}%</div>}
              <span style={{color:'#C8102E',fontSize:20}}>›</span>
            </div>
          </div>
        </div>
      ))}
    </>
  );
}

// LEAD VIEW
// ============================================================
function LeadView({ lang, user, operators, goals, lastReport, onLogout, backLabel }) {
  const isDesktop=useIsDesktop();
  const [date,setDate]=useState(todayStr);
  const [pressItems,setPressItems]=useState(()=>initPressData(goals,lastReport));
  const [submitting,setSubmitting]=useState(false), [countdown,setCountdown]=useState(5);
  const [submitted,setSubmitted]=useState(false), [submittedData,setSubmittedData]=useState(null);
  const [overallHit,setOverallHit]=useState(null), [submitError,setSubmitError]=useState('');
  const [copied,setCopied]=useState(false);
  const timerRef=useRef(null), payloadRef=useRef(null);

  const handleChange=(pressNum,field,val)=>setPressItems(prev=>prev.map(p=>p.pressNumber===pressNum?{...p,[field]:val}:p));

  const handleSubmit=()=>{
    const running=pressItems.filter(p=>p.isRunning);
    const tGood=running.reduce((s,p)=>s+(parseInt(p.good,10)||0),0);
    const tGoal=running.reduce((s,p)=>s+(parseInt(p.goal,10)||0),0);
    payloadRef.current={date,submittedBy:user.username,pressData:pressItems.map(p=>({...p}))};
    setOverallHit(tGoal>0?Math.round((tGood/tGoal)*100):null);
    setSubmitError(''); setCountdown(5); setSubmitting(true);
  };

  useEffect(()=>{
    if (!submitting) return;
    let cnt=5;
    timerRef.current=setInterval(()=>{ cnt-=1; setCountdown(cnt); if(cnt<=0){clearInterval(timerRef.current);doSubmit();} },1000);
    return ()=>clearInterval(timerRef.current);
  },[submitting]);

  const handleUndo=()=>{ clearInterval(timerRef.current); setSubmitting(false); setCountdown(5); };

  const doSubmit=async()=>{
    const payload=payloadRef.current;
    try {
      const result=await gasCall('submitReport',payload);
      if (result.success) { setSubmittedData(payload.pressData); setSubmitting(false); setSubmitted(true); }
      else { setSubmitting(false); setSubmitError(result.error||tx(lang,'errOccurred')); }
    } catch { setSubmitting(false); setSubmitError(tx(lang,'networkErr')); }
  };

  const handleCopy=async()=>{ try { await navigator.clipboard.writeText(generatePassdown(submittedData)); setCopied(true); setTimeout(()=>setCopied(false),2500); } catch {} };

  const resetForm=()=>{ setSubmitted(false); setSubmittedData(null); setPressItems(initPressData(goals,lastReport)); setDate(todayStr()); };

  if (submitted) {
    const passText=generatePassdown(submittedData||[]);
    return (
      <div className="success-panels">
        <div className="success-left">
          <div className="success-icon">✅</div>
          <div className="success-title">{tx(lang,'submitted')}</div>
          <div className="success-sub">{tx(lang,'submittedSub')}</div>
          {overallHit!==null&&overallHit>=90&&<div className="congrats-box"><div className="congrats-title">🏆 {tx(lang,'congrats')} {user.username}!</div><div className="congrats-sub">{tx(lang,'congratsSub')} {overallHit}%</div></div>}
          <div style={{width:'100%',maxWidth:280,display:'flex',flexDirection:'column',gap:10,marginTop:8}}>
            <button className="btn btn-red" onClick={resetForm}>{tx(lang,'newReport')}</button>
            <button className="btn btn-gray" onClick={onLogout}>{backLabel||tx(lang,'logout')}</button>
          </div>
        </div>
        <div className="success-right">
          <div className="passdown-label">{tx(lang,'passdown')}</div>
          <pre className="passdown-pre">{passText}</pre>
          <button className="btn btn-outline" onClick={handleCopy}>{copied?`✓ ${tx(lang,'copied')}`:tx(lang,'copyPassdown')}</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="app-header">
        <div><div className="header-title">nVent | {tx(lang,'appName')}</div><div className="header-sub">{tx(lang,'shift')} — {user.username}</div></div>
        <button className="header-btn" onClick={onLogout}>{backLabel||tx(lang,'logout')}</button>
      </div>
      <div className="date-bar">
        <span className="date-bar-label">{tx(lang,'reportDate')}</span>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}} />
      </div>
      <div className="scroll-area">
        {submitError&&<div className="alert alert-error">{submitError}</div>}
        <div className={isDesktop?'press-grid':''}>{pressItems.map(p=><PressCard key={p.pressNumber} data={p} operators={operators} lang={lang} onChange={handleChange} />)}</div>
      </div>
      <div className="bottom-bar"><button className="btn btn-red" onClick={handleSubmit}>{tx(lang,'submitReport')}</button></div>
      {submitting&&<UndoOverlay countdown={countdown} lang={lang} onUndo={handleUndo} />}
    </div>
  );
}

function UserModal({ lang, item, onSave, onClose }) {
  const [username,setUsername]=useState(item?item.username:'');

  const [role,setRole]=useState(item?item.role:'lead');

  const [notifyReport,setNotifyReport]=useState(item?item.notifyReport||false:false);

    if (!username.trim()) return; if (!item&&!password) return; setSaving(true); setErr('');
    try {
      const payload=item?{id:item.id,username:username.trim(),role,email,notifyReport,...(password?{password}:{})}:{username:username.trim(),password,role,email,notifyReport};

        <div className="field"><label className="field-label">{tx(lang,'role')}</label><select value={role} onChange={e=>setRole(e.target.value)}><option value="lead">{tx(lang,'lead')}</option><option value="manager">{tx(lang,'managerRole')}</option></select></div>

          <button className="btn btn-red" style={{flex:1}} onClick={save} disabled={saving}>{saving?tx(lang,'saving'):tx(lang,'save')}</button>

  );

function ReportDetail({ report, lang, onBack, onArchive }) {
  const [resending,setResending]=useState(false), [archiving,setArchiving]=useState(false);
  const [msg,setMsg]=useState('');
  const [editingPress,setEditingPress]=useState(null), [moldInput,setMoldInput]=useState('');
  const [localData,setLocalData]=useState(report.pressData||[]);
  const [copied,setCopied]=useState(false);

  const resend=async()=>{ setResending(true); setMsg(''); try { const r=await gasCall('resendEmail',{reportId:report.id}); setMsg(r.success?'Email re-sent.':'Error: '+(r.error||'Unknown')); } catch { setMsg(tx(lang,'networkErr')); } setResending(false); };
  const handleCopyPassdown=async()=>{ try { await navigator.clipboard.writeText(generatePassdown(localData)); setCopied(true); setTimeout(()=>setCopied(false),2500); } catch {} };
  const handleArchive=async()=>{
    if (!window.confirm(tx(lang,'confirmArchive'))) return;
    setArchiving(true);
    try { const r=await gasCall('archiveReport',{reportId:report.id}); if(r.success) onArchive(report.id); } catch { setMsg(tx(lang,'networkErr')); }
    setArchiving(false);
  };
  const saveMold=async(resendEmail)=>{
    const pressNumber=editingPress;
    try {
      const result=await gasCall('editReport',{reportId:report.id,pressNumber,updates:{moldNumber:moldInput},resendEmail});
      if (result.success) { setLocalData(prev=>prev.map(p=>String(p.pressNumber)===String(pressNumber)?{...p,moldNumber:moldInput}:p)); setMsg(resendEmail?'Saved and email re-sent.':'Saved.'); }
      else { setMsg('Error: '+(result.error||'Unknown')); }
    } catch { setMsg(tx(lang,'networkErr')); }
    setEditingPress(null);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="app-header">
        <div><div className="header-title">{formatDate(report.date)}</div><div className="header-sub">{tx(lang,'submittedBy')}: {report.submittedBy} · {formatDateTime(report.timestamp)}</div></div>
        <button className="header-btn" onClick={onBack}>{tx(lang,'back')}</button>
      </div>
      <div className="scroll-area">
        {msg&&<div className="alert alert-info">{msg}</div>}
        <div className="card" style={{marginBottom:11}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-outline" style={{flex:1}} onClick={resend} disabled={resending}>{resending?'...':tx(lang,'resend')}</button>
            <button className="btn btn-outline" style={{flex:1}} onClick={handleCopyPassdown}>{copied?`✓ ${tx(lang,'copied')}`:tx(lang,'copyPassdown')}</button>
            <button className="btn-sm btn-sm-danger" style={{width:'100%',padding:'10px',textAlign:'center',borderRadius:8}} onClick={handleArchive} disabled={archiving}>{archiving?'...':tx(lang,'archiveReport')}</button>
          </div>
          <pre className="passdown-pre" style={{marginTop:10,fontSize:11}}>{generatePassdown(localData)}</pre>
        </div>
        {localData.map(p=>{
          const hit=p.isRunning?calcHit(p.good,p.goal):null;
          const isEditing=editingPress===p.pressNumber||editingPress===String(p.pressNumber);
          let cardClass='card press-card';
          if (!p.isRunning) cardClass+=' is-stopped'; else if (p.hasIssue) cardClass+=' is-running has-issue'; else cardClass+=' is-running';
          return (
            <div key={p.pressNumber} className={cardClass}>
              <div className="press-card-top">
                <div className="press-num">{tx(lang,'press')} {p.pressNumber}</div>
                <span className={`press-badge ${!p.isRunning?'badge-stopped':p.hasIssue?'badge-issue':'badge-ok'}`}>{!p.isRunning?tx(lang,'stopped'):p.hasIssue?tx(lang,'issue'):tx(lang,'ok')}</span>
              </div>
              <div style={{fontSize:13,color:'#888',marginBottom:4}}>{p.operatorName?`${p.operatorName} — #${p.operatorStamp}`:'—'}</div>
              <div className="mold-display">{tx(lang,'moldNo')}: {p.moldNumber||'—'} <button onClick={()=>{setEditingPress(p.pressNumber);setMoldInput(p.moldNumber||'');}} style={{marginLeft:8,background:'none',border:'none',color:'#C8102E',fontSize:11,cursor:'pointer',fontWeight:'bold'}}>{tx(lang,'editMold')}</button></div>
              {isEditing&&<div className="mold-edit-row"><input className="mold-edit-input" type="text" value={moldInput} placeholder="e.g. M-452-A" onChange={e=>setMoldInput(e.target.value)} /><button className="btn-sm btn-sm-gray" onClick={()=>saveMold(false)}>{tx(lang,'saveQuiet')}</button><button className="btn-sm btn-sm-green" onClick={()=>saveMold(true)}>{tx(lang,'saveAndResend')}</button></div>}
              {p.isRunning?(
                <div className="three-col" style={{marginTop:8,marginBottom:4}}>
                  {[[tx(lang,'good'),p.good||0],[tx(lang,'scrap'),p.scrap||0],[tx(lang,'hitPct'),hit!==null?hit+'%':'—']].map(([label,val],i)=>(
                    <div key={label} style={{textAlign:'center'}}><div className="col-label">{label}</div><div style={{fontSize:20,fontWeight:'bold',color:i===2&&hit!==null?hitHexColor(hit):'#1a1a1a'}}>{val}</div></div>
                  ))}
                </div>
              ):(
                <div style={{fontSize:14,color:'#777',marginTop:4}}>{p.notRunningReason||'—'}</div>
              )}
              {p.notes&&<div style={{fontSize:13,fontStyle:'italic',color:'#555',marginTop:8,padding:'7px 10px',background:'#f8f8f8',borderRadius:6}}>"{p.notes}"</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OverviewTab({ lang, operators }) {
  const [period,setPeriod]=useState('week');
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const isDesktop=useIsDesktop();

  useEffect(()=>{ loadReports(); },[period]);

  const loadReports=async()=>{
    setLoading(true);
    const {start,end}=getDateRange(period);
    try { const r=await gasCall('getReportsByRange',{startDate:start,endDate:end}); if(r.success) setReports(r.reports); } catch {}
    setLoading(false);
  };

  const periods=[['week',tx(lang,'thisWeek')],['lastWeek',tx(lang,'lastWeek')],['month',tx(lang,'thisMonth')]];

  // Calculate molder alerts from week reports
  const molderAlerts=reports.length&&operators.length ? operators.map(op=>{
    const s=getMolderWeekStatus(op.name,reports);
    return {...op,...s};
  }).filter(op=>op.isConcern||op.isOnFire) : [];

  const concerns=molderAlerts.filter(o=>o.isConcern);
  const onFire=molderAlerts.filter(o=>o.isOnFire&&!o.isConcern);

  if (loading) return (<><div className="period-filter">{periods.map(([k,l])=><button key={k} className={`period-btn${period===k?' active':''}`} onClick={()=>setPeriod(k)}>{l}</button>)}</div><div className="loading-msg">{tx(lang,'loading')}</div></>);

  if (!reports.length) return (<><div className="period-filter">{periods.map(([k,l])=><button key={k} className={`period-btn${period===k?' active':''}`} onClick={()=>setPeriod(k)}>{l}</button>)}</div><div className="empty-msg" style={{padding:40}}>{tx(lang,'noWeekData')}</div></>);

  const opStats={}, pressStats={};
  let totalGood=0, totalGoal=0;
  const dayStats={};

  reports.forEach(r=>{
    const d=r.date;
    if (!dayStats[d]) dayStats[d]={good:0,goal:0};
    (r.pressData||[]).forEach(p=>{
      if (!p.isRunning) return;
      const g=parseInt(p.good||0,10), gl=parseInt(p.goal||0,10);
      if (!gl) return;
      totalGood+=g; totalGoal+=gl;
      dayStats[d].good+=g; dayStats[d].goal+=gl;
      if (!pressStats[p.pressNumber]) pressStats[p.pressNumber]={good:0,goal:0};
      pressStats[p.pressNumber].good+=g; pressStats[p.pressNumber].goal+=gl;
      if (p.operatorName) {
        if (!opStats[p.operatorName]) opStats[p.operatorName]={good:0,goal:0};
        opStats[p.operatorName].good+=g; opStats[p.operatorName].goal+=gl;
      }
    });
  });

  const overall=totalGoal>0?Math.round((totalGood/totalGoal)*100):0;
  const opRanked=Object.entries(opStats).map(([n,s])=>({name:n,hit:Math.round((s.good/s.goal)*100)})).sort((a,b)=>b.hit-a.hit);
  const pressRanked=Object.entries(pressStats).map(([p,s])=>({press:p,hit:Math.round((s.good/s.goal)*100)})).sort((a,b)=>b.hit-a.hit);
  const dayRanked=Object.entries(dayStats).map(([date,d])=>({date,hit:d.goal>0?Math.round((d.good/d.goal)*100):0})).sort((a,b)=>b.hit-a.hit);
  const bestDay=dayRanked[0], worstDay=dayRanked[dayRanked.length-1];

  return (
    <>
      {/* Alert section */}
      {concerns.length>0&&<div className="alert-section alert-section-concern"><div className="alert-section-title" style={{color:'#C8102E'}}>⚠ {tx(lang,'concernFlag')} — below 75%</div><div className="alert-names" style={{color:'#C8102E'}}>{concerns.map(o=>o.name).join(', ')}</div></div>}
      {onFire.length>0&&<div className="alert-section alert-section-fire"><div className="alert-section-title" style={{color:'#1e7e34'}}>🏆 {tx(lang,'onFireFlag')} — 95%+ three nights in a row</div><div className="alert-names" style={{color:'#1e7e34'}}>{onFire.map(o=>o.name).join(', ')}</div></div>}

      <div className="period-filter">{periods.map(([k,l])=><button key={k} className={`period-btn${period===k?' active':''}`} onClick={()=>setPeriod(k)}>{l}</button>)}</div>

      <div className="stat-row">
        <div className="stat-card"><div className="stat-big" style={{color:hitHexColor(overall)}}>{overall}%</div><div className="stat-label">{tx(lang,'overallHit')}</div></div>
        <div className="stat-card"><div className="stat-big">{totalGood.toLocaleString()}</div><div className="stat-label">{tx(lang,'totalGood')}</div></div>
        <div className="stat-card"><div className="stat-big">{reports.length}</div><div className="stat-label">{tx(lang,'reports')}</div></div>
      </div>

      {dayRanked.length>1&&<div className="stat-row">
        <div className="stat-card"><div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:4}}>🏆 {tx(lang,'bestDay')}</div><div style={{fontSize:22,fontWeight:'bold',color:'#1e7e34'}}>{bestDay.hit}%</div><div style={{fontSize:12,color:'#555',marginTop:2}}>{formatDate(bestDay.date)}</div></div>
        <div className="stat-card"><div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:4}}>📉 {tx(lang,'worstDay')}</div><div style={{fontSize:22,fontWeight:'bold',color:'#C8102E'}}>{worstDay.hit}%</div><div style={{fontSize:12,color:'#555',marginTop:2}}>{formatDate(worstDay.date)}</div></div>
      </div>}

      <div className="section-head">{tx(lang,'prodVsGoal')}</div>
      <div className="card"><PressBarChart reports={reports} /></div>

      {dayRanked.length>0&&<><div className="section-head">{tx(lang,'dailyPerf')}</div>
      <div className="card">{[...dayRanked].sort((a,b)=>a.date.localeCompare(b.date)).map(({date,hit})=>(
        <div key={date} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
          <div style={{width:56,fontSize:11,color:'#888',flexShrink:0}}>{formatDate(date)}</div>
          <div style={{flex:1,background:'#f0f0f0',borderRadius:4,height:18,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(hit,100)}%`,background:hitHexColor(hit),borderRadius:4}}></div></div>
          <div style={{width:38,fontSize:12,fontWeight:'bold',color:hitHexColor(hit),textAlign:'right'}}>{hit}%</div>
        </div>
      ))}</div></>}

      <div className={isDesktop?'scorecard-cols':''}>
        <div className="card" style={{marginBottom:11}}>
          <div className="section-head">{tx(lang,'opScorecard')}</div>
          {opRanked.map(o=>(
            <div key={o.name} className="scorecard-row">
              <div className="scorecard-name">{o.name}{concerns.find(c=>c.name===o.name)&&<span style={{color:'#C8102E',marginLeft:6,fontSize:11}}>⚠</span>}{onFire.find(c=>c.name===o.name)&&<span style={{marginLeft:6,fontSize:11}}>🏆</span>}</div>
              <div className="scorecard-bar-wrap"><div className="scorecard-bar" style={{width:`${Math.min(o.hit,100)}%`,background:hitHexColor(o.hit)}}></div></div>
              <div className="scorecard-pct" style={{color:hitHexColor(o.hit)}}>{o.hit}%</div>
            </div>
          ))}
        </div>
        <div className="card" style={{marginBottom:11}}>
          <div className="section-head">{tx(lang,'pressPerf')}</div>
          {pressRanked.map(p=>(
            <div key={p.press} className="scorecard-row">
              <div className="scorecard-name">{tx(lang,'press')} {p.press}</div>
              <div className="scorecard-bar-wrap"><div className="scorecard-bar" style={{width:`${Math.min(p.hit,100)}%`,background:hitHexColor(p.hit)}}></div></div>
              <div className="scorecard-pct" style={{color:hitHexColor(p.hit)}}>{p.hit}%</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function ManagerView({ lang, user, operators, setOperators, goals, setGoals, onLogout, onOpenSubmit }) {
  const [tab,setTab]=useState('overview');
  const [users,setUsers]=useState([]), [reports,setReports]=useState([]);
  const [archivedReports,setArchivedReports]=useState([]), [showArchived,setShowArchived]=useState(false);
  const [loading,setLoading]=useState(false), [modal,setModal]=useState(null);
  const [selectedReport,setSelectedReport]=useState(null);
  const [localGoals,setLocalGoals]=useState({...goals}), [goalMsg,setGoalMsg]=useState('');
  const isDesktop=useIsDesktop();

  useEffect(()=>{
    if (tab==='users') loadUsers();
    else if (tab==='reports') { loadReports(); }
    else if (tab==='goals') setLocalGoals({...goals});
  },[tab]);

  const loadUsers   =async()=>{ setLoading(true); try{const r=await gasCall('getUsers');    if(r.success)setUsers(r.users);}    catch{} setLoading(false); };
  const loadReports =async()=>{ setLoading(true); try{const r=await gasCall('getReports');  if(r.success)setReports(r.reports);}catch{} setLoading(false); };
  const loadArchived=async()=>{ try{const r=await gasCall('getArchivedReports'); if(r.success)setArchivedReports(r.reports);}catch{}; };
  const refreshOps  =async()=>{ try{const r=await gasCall('getOperators'); if(r.success)setOperators(r.operators);}catch{}; };
  const delUser     =async id=>{ if(!window.confirm(tx(lang,'confirmDel')))return; await gasCall('deleteUser',{id}); loadUsers(); };
  const delOperator =async id=>{ if(!window.confirm(tx(lang,'confirmDel')))return; await gasCall('deleteOperator',{id}); refreshOps(); };
  const saveGoals   =async()=>{
    const arr=PRESSES.map(p=>({press:p,goal:parseInt(localGoals[p],10)||0}));
    const r=await gasCall('updateGoals',{goals:arr});
    if (r.success) { const u={}; PRESSES.forEach(p=>{u[p]=parseInt(localGoals[p],10)||0;}); setGoals(u); setGoalMsg(tx(lang,'goalsSaved')); setTimeout(()=>setGoalMsg(''),3000); }
  };

  const handleArchive=reportId=>{ setSelectedReport(null); setReports(prev=>prev.filter(r=>r.id!==reportId)); };
  const handleRestore=async reportId=>{
    await gasCall('archiveReport',{reportId,restore:true});
    setArchivedReports(prev=>prev.filter(r=>r.id!==reportId));
  };

  const toggleArchived=()=>{ if (!showArchived) loadArchived(); setShowArchived(v=>!v); };

  if (selectedReport) return <ReportDetail report={selectedReport} lang={lang} onBack={()=>setSelectedReport(null)} onArchive={handleArchive} />;

  const tabs=['overview','molders','submit','users','operators','goals','reports'];

  const renderContent=()=>{
    if (loading) return <div className="loading-msg">{tx(lang,'loading')}</div>;

    if (tab==='overview') return <OverviewTab lang={lang} operators={operators} />;
    if (tab==='molders')  return <MolderProfilesTab lang={lang} operators={operators} user={user} />;

    if (tab==='submit') return (
      <div className="submit-intro">
        <div style={{fontSize:40}}>📋</div>
        <div style={{fontSize:16,fontWeight:'bold'}}>{tx(lang,'openForm')}</div>
        <div style={{fontSize:14,color:'#888'}}>{tx(lang,'openFormDesc')}</div>
        <button className="btn btn-red" style={{maxWidth:280,width:'100%',margin:'8px auto 0'}} onClick={onOpenSubmit}>{tx(lang,'openForm')}</button>
      </div>
    );

    if (tab==='users') return (
      <>
        <button className="btn btn-red" style={{marginBottom:12}} onClick={()=>setModal({type:'user',item:null})}>+ {tx(lang,'addUser')}</button>
        <div className="card">
          {users.length===0&&<div className="empty-msg">{tx(lang,'noUsers')}</div>}
          {users.map(u=>(
            <div key={u.id} className="list-row">
              <div><div className="list-row-main">{u.username}</div><div className="list-row-sub">{u.role==='manager'?tx(lang,'managerRole'):tx(lang,'lead')}{u.email?` — ${u.email}`:''}</div></div>
              <div className="list-row-actions"><button className="btn-sm btn-sm-gray" onClick={()=>setModal({type:'user',item:u})}>{tx(lang,'edit')}</button><button className="btn-sm btn-sm-danger" onClick={()=>delUser(u.id)}>{tx(lang,'delete')}</button></div>
            </div>
          ))}
        </div>
      </>
    );

    if (tab==='operators') return (
      <>
        <button className="btn btn-red" style={{marginBottom:12}} onClick={()=>setModal({type:'operator',item:null})}>+ {tx(lang,'addOp')}</button>
        <div className="card">
          {operators.length===0&&<div className="empty-msg">{tx(lang,'noOps')}</div>}
          {operators.map(op=>(
            <div key={op.id} className="list-row">
              <div><div className="list-row-main">{op.name}</div><div className="list-row-sub">{tx(lang,'stampNo')}: {op.stampNumber}</div></div>
              <div className="list-row-actions"><button className="btn-sm btn-sm-gray" onClick={()=>setModal({type:'operator',item:op})}>{tx(lang,'edit')}</button><button className="btn-sm btn-sm-danger" onClick={()=>delOperator(op.id)}>{tx(lang,'delete')}</button></div>
            </div>
          ))}
        </div>
      </>
    );

    if (tab==='goals') return (
      <>
        {goalMsg&&<div className="alert alert-success">{goalMsg}</div>}
        <div className="section-head">{tx(lang,'defaultGoals')}</div>
        <div className="card">
          {PRESSES.map(p=>(
            <div key={p} className="goal-row">
              <div className="goal-label">{tx(lang,'press')} {p}</div>
              <input className="goal-input" type="text" inputMode="numeric" pattern="[0-9]*"
                value={localGoals[p]!=null?localGoals[p]:''} onChange={e=>setLocalGoals(prev=>({...prev,[p]:e.target.value.replace(/[^0-9]/g,'')}))} />
            </div>
          ))}
        </div>
        <button className="btn btn-red mt-12" onClick={saveGoals}>{tx(lang,'saveGoals')}</button>
      </>
    );

    if (tab==='reports') return (
      <>
        {reports.length===0&&<div className="empty-msg" style={{padding:24}}>{tx(lang,'noReports')}</div>}
        {reports.map(r=>{
          const issues=(r.pressData||[]).filter(p=>p.hasIssue).length;
          const stopped=(r.pressData||[]).filter(p=>!p.isRunning).length;
          return (
            <div key={r.id} className="card report-card" onClick={()=>setSelectedReport(r)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:'bold',fontSize:16}}>{formatDate(r.date)}</div><div className="report-meta">{r.submittedBy} · {formatDateTime(r.timestamp)}</div></div>
                <span style={{color:'#C8102E',fontSize:22,fontWeight:'bold'}}>›</span>
              </div>
              {(issues>0||stopped>0)&&<div className="report-flags">{issues>0&&<span className="flag flag-issue">⚠ {issues} {issues===1?'issue':'issues'}</span>}{stopped>0&&<span className="flag flag-stopped">● {stopped} not running</span>}</div>}
            </div>
          );
        })}

        {/* Archived section */}
        <div className="archived-toggle" onClick={toggleArchived}>
          <span className="archived-toggle-label">📦 {tx(lang,'archivedReports')}</span>
          <span style={{fontSize:14,color:'#aaa'}}>{showArchived?'▲':'▼'}</span>
        </div>
        {showArchived&&(
          <div>
            {archivedReports.length===0&&<div className="empty-msg" style={{padding:16}}>{tx(lang,'noArchived')}</div>}
            {archivedReports.map(r=>(
              <div key={r.id} className="card" style={{opacity:0.75}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><div style={{fontWeight:'bold',fontSize:15}}>{formatDate(r.date)}</div><div className="report-meta">{r.submittedBy} · {formatDateTime(r.timestamp)}</div></div>
                  <button className="btn-sm btn-sm-green" onClick={()=>handleRestore(r.id)}>{tx(lang,'restore')}</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </>
    );

    return null;
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div className="app-header">
        <div><div className="header-title">nVent | {tx(lang,'manager')}</div><div className="header-sub">{user.username}</div></div>
        <button className="header-btn" onClick={onLogout}>{tx(lang,'logout')}</button>
      </div>
      {!isDesktop&&<div className="tabs mgr-tabs-mobile">{tabs.map(tk=><div key={tk} className={`tab${tab===tk?' active':''}`} onClick={()=>setTab(tk)}>{tx(lang,tk)}</div>)}</div>}
      <div className="mgr-body">
        {isDesktop&&<div className="mgr-sidebar">{tabs.map(tk=><button key={tk} className={`mgr-sidebar-btn${tab===tk?' active':''}`} onClick={()=>setTab(tk)}>{tx(lang,tk)}</button>)}</div>}
        <div className="mgr-content">{renderContent()}</div>
      </div>
      {modal?.type==='user'&&<UserModal lang={lang} item={modal.item} onSave={()=>{setModal(null);loadUsers();}} onClose={()=>setModal(null)} />}
      {modal?.type==='operator'&&<OperatorModal lang={lang} item={modal.item} onSave={()=>{setModal(null);refreshOps();}} onClose={()=>setModal(null)} />}
    </div>
  );
}

function App() {
  const [lang,setLang]=useState(()=>localStorage.getItem('moldingLang')||null);
  const [screen,setScreen]=useState(()=>localStorage.getItem('moldingLang')?'login':'language');
  const [user,setUser]=useState(null), [operators,setOperators]=useState([]);
  const [goals,setGoals]=useState({...DEFAULT_GOALS}), [lastReport,setLastReport]=useState(null);
  const [loginError,setLoginError]=useState(''), [loginLoading,setLoginLoading]=useState(false);
  const [appLoading,setAppLoading]=useState(false);

  const selectLang=l=>{ localStorage.setItem('moldingLang',l); setLang(l); setScreen('login'); };
  const toggleLang=()=>{ const nl=lang==='en'?'es':'en'; localStorage.setItem('moldingLang',nl); setLang(nl); setLoginError(''); };

  const handleLogin=async(username,password)=>{
    setLoginError(''); setLoginLoading(true);
    try {
      const result=await gasCall('login',{username,password});
      if (result.success) {
        setUser(result.user); setLoginLoading(false); setAppLoading(true);
        const [opRes,goalRes,lastRes]=await Promise.all([gasCall('getOperators'),gasCall('getGoals'),gasCall('getLastReport')]);
        if (opRes.success)   setOperators(opRes.operators);
        if (goalRes.success) setGoals(prev=>{ const m={...prev}; Object.keys(goalRes.goals).forEach(k=>{m[parseInt(k,10)]=parseInt(goalRes.goals[k],10);}); return m; });
        if (lastRes.success) setLastReport(lastRes.report);
        setAppLoading(false);
        setScreen(result.user.role==='manager'?'manager':'lead');
      } else { setLoginError(tx(lang||'en','invalidCreds')); setLoginLoading(false); }
    } catch { setLoginError(tx(lang||'en','networkErr')); setLoginLoading(false); }
  };

  const handleLogout=()=>{ setUser(null); setLoginError(''); setScreen('login'); };

  if (appLoading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'white'}}>
      <div style={{textAlign:'center',color:'#aaa'}}><div style={{width:36,height:4,background:'#C8102E',margin:'0 auto 16px',borderRadius:2}}></div>{tx(lang||'en','loading')}</div>
    </div>
  );

  return (
    <div className="app-wrap">
      {screen==='language'&&<LanguageScreen onSelect={selectLang} />}
      {screen==='login'&&<LoginScreen lang={lang||'en'} onLogin={handleLogin} onLangToggle={toggleLang} loading={loginLoading} error={loginError} />}
      {screen==='lead'&&user&&<LeadView lang={lang} user={user} operators={operators} goals={goals} lastReport={lastReport} onLogout={handleLogout} />}
      {screen==='manager'&&user&&<ManagerView lang={lang} user={user} operators={operators} setOperators={setOperators} goals={goals} setGoals={setGoals} onLogout={handleLogout} onOpenSubmit={()=>setScreen('managerSubmit')} />}
      {screen==='managerSubmit'&&user&&<LeadView lang={lang} user={user} operators={operators} goals={goals} lastReport={lastReport} onLogout={()=>setScreen('manager')} backLabel={tx(lang,'back')} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
