function tx(lang,key){return (T[lang]||T.en)[key]||key;}

function formatDate(val){
  if(!val||val==='undefined'||val==='null')return '—';
  const s=String(val);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){const p=s.split('-');return `${mo[parseInt(p[1],10)-1]} ${parseInt(p[2],10)}`;}
  try{const d=new Date(s);if(!isNaN(d.getTime()))return `${mo[d.getMonth()]} ${d.getDate()}`;}catch{}
  return s;
}
function formatDateTime(ts){
  if(!ts||ts==='undefined')return '—';
  try{const d=new Date(ts);if(isNaN(d.getTime()))return ts;
    const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let h=d.getHours(),mins=String(d.getMinutes()).padStart(2,'0');
    const ampm=h>=12?'PM':'AM';h=h%12||12;
    return `${mo[d.getMonth()]} ${d.getDate()} \u00b7 ${h}:${mins} ${ampm}`;
  }catch{return ts;}
}
async function gasCall(action,payload={}){

  if(!res.ok)throw new Error(`HTTP ${res.status}`);

}

function calcHit(good,goal){const g=parseInt(good,10),gl=parseInt(goal,10);if(!gl||isNaN(g)||g===0)return null;return Math.round((g/gl)*100);}
function getDateRange(period){
  const now=new Date(),dow=now.getDay(),back=dow===0?6:dow-1;
  if(period==='week'){const mon=new Date(now);mon.setDate(now.getDate()-back);mon.setHours(0,0,0,0);return{startDate:mon.toISOString(),endDate:now.toISOString()};}
  if(period==='lastWeek'){const tm=new Date(now);tm.setDate(now.getDate()-back);tm.setHours(0,0,0,0);const lm=new Date(tm);lm.setDate(tm.getDate()-7);const ls=new Date(tm);ls.setMilliseconds(-1);return{startDate:lm.toISOString(),endDate:ls.toISOString()};}
  if(period==='month'){const s=new Date(now.getFullYear(),now.getMonth(),1);return{startDate:s.toISOString(),endDate:now.toISOString()};}
  return{startDate:new Date(2020,0,1).toISOString(),endDate:now.toISOString()};
}
function getMondayStr(dateStr){try{const d=new Date(dateStr+'T12:00:00'),dow=d.getDay(),back=dow===0?6:dow-1;d.setDate(d.getDate()-back);return d.toISOString().split('T')[0];}catch{return dateStr;}}

function generatePassdown(pressData){

function generateEHPassdown(pressData,totalEH,goalEH,date,username){
  const pad=(s,n)=>String(s).padEnd(n);
  let lines=`EH Prediction \u2014 ${formatDate(date)} \u2014 2nd Shift\nSubmitted by: ${username}\n${'─'.repeat(50)}\n\n`;
  lines+=`${pad('Press',7)} ${pad('Part',20)} ${pad('Est. Qty',10)} Proj. EH\n${'─'.repeat(50)}\n`;
  (pressData||[]).forEach(p=>{if(!p.isRunning){lines+=`${pad(p.pressNumber,7)} NOT RUNNING${p.notRunningReason?' \u2014 '+p.notRunningReason:''}\n`;}else{const eh=(p.partEhRate&&p.estimatedQty)?((parseInt(p.estimatedQty)||0)*p.partEhRate).toFixed(2)+'h':'—';lines+=`${pad(p.pressNumber,7)} ${pad(p.partNumber||'(no part)',20)} ${pad(p.estimatedQty||'0',10)} ${eh}\n`;}});
  const pct=goalEH>0?Math.round((totalEH/goalEH)*100):0;
  lines+=`\n${'─'.repeat(50)}\nTotal Projected EH : ${totalEH.toFixed(2)}h\nGoal (2nd Shift)   : ${goalEH}h\nStatus             : ${totalEH>=goalEH?'\u2713 ON TRACK':'\u26a0 BELOW GOAL ('+pct+'%)'}\n`;
  return lines;
}
function calcPressEH(p){if(!p.isRunning||!p.partEhRate||!p.estimatedQty)return 0;const q=parseInt(p.estimatedQty,10);return isNaN(q)||q<=0?0:q*p.partEhRate;}
function calcMolderStats(opName,reports){
  const nightMap={},pressMap={},weekMap={};
  reports.forEach(r=>{let nG=0,nGl=0,hi=false;(r.pressData||[]).forEach(p=>{if(p.operatorName!==opName||!p.isRunning)return;const g=parseInt(p.good||0,10),gl=parseInt(p.goal||0,10);if(!gl)return;nG+=g;nGl+=gl;if(p.hasIssue)hi=true;if(!pressMap[p.pressNumber])pressMap[p.pressNumber]={good:0,goal:0,nights:0,issues:0,molds:[]};pressMap[p.pressNumber].good+=g;pressMap[p.pressNumber].goal+=gl;pressMap[p.pressNumber].nights++;if(p.hasIssue)pressMap[p.pressNumber].issues++;if(p.moldNumber)pressMap[p.pressNumber].molds.push(p.moldNumber);});if(nGl>0){nightMap[r.date]={good:nG,goal:nGl,hit:Math.round((nG/nGl)*100),hasIssue:hi};const wk=getMondayStr(r.date);if(!weekMap[wk])weekMap[wk]={good:0,goal:0,nights:0};weekMap[wk].good+=nG;weekMap[wk].goal+=nGl;weekMap[wk].nights++;}});
  const nights=Object.entries(nightMap).map(([date,d])=>({date,...d})).sort((a,b)=>a.date.localeCompare(b.date));
  const tG=nights.reduce((s,n)=>s+n.good,0),tGl=nights.reduce((s,n)=>s+n.goal,0);
  const avgHit=tGl>0?Math.round((tG/tGl)*100):null;
  const issueRate=nights.length>0?Math.round((nights.filter(n=>n.hasIssue).length/nights.length)*100):0;
  const pressBreakdown=Object.entries(pressMap).map(([press,d])=>({press,hit:Math.round((d.good/d.goal)*100),nights:d.nights,latestMold:d.molds[d.molds.length-1]||''})).sort((a,b)=>b.hit-a.hit);
  const weeklySummary=Object.entries(weekMap).map(([week,d])=>({week,hit:Math.round((d.good/d.goal)*100),good:d.good,goal:d.goal,nights:d.nights})).sort((a,b)=>b.week.localeCompare(a.week));
  const last3=nights.slice(-3);
  return{nights,avgHit,issueRate,pressBreakdown,weeklySummary,isOnFire:last3.length>=3&&last3.every(n=>n.hit>=95),isConcern:avgHit!==null&&avgHit<75,totalNights:nights.length};
}
function getMolderWeekStatus(opName,reports){
  let tG=0,tGl=0;const nights=[];
  reports.forEach(r=>{let nG=0,nGl=0,hi=false;(r.pressData||[]).forEach(p=>{if(p.operatorName!==opName||!p.isRunning)return;const g=parseInt(p.good||0,10),gl=parseInt(p.goal||0,10);nG+=g;nGl+=gl;if(p.hasIssue)hi=true;});if(nGl>0){tG+=nG;tGl+=nGl;nights.push({date:r.date,hit:Math.round((nG/nGl)*100),hasIssue:hi});}});
  nights.sort((a,b)=>a.date.localeCompare(b.date));
  const weekAvg=tGl>0?Math.round((tG/tGl)*100):null;
  const last3=nights.slice(-3);
  return{weekAvg,isConcern:weekAvg!==null&&weekAvg<75,isOnFire:last3.length>=3&&last3.every(n=>n.hit>=95),nightCount:nights.length};
}

  const handlePart=part=>{upd('partId',part?part.id:'');upd('partNumber',part?part.partNumber:'');upd('partEhRate',part?part.ehRate:0);};

      <div className="field"><label className="field-label">{tx(lang,'moldNo')} <span style={{color:'#ccc',fontWeight:'normal',textTransform:'none',fontSize:10}}>({tx(lang,'moldOptional')})</span></label><input type="text" value={moldNumber} placeholder="e.g. M-452-A" onChange={e=>upd('moldNumber',e.target.value)}/></div>
      {parts.length>0&&<div className="field"><label className="field-label">{tx(lang,'part')} <span style={{color:'#ccc',fontWeight:'normal',textTransform:'none',fontSize:10}}>({tx(lang,'partOptional')})</span></label><PartSearch parts={parts} selectedPart={selPart} onSelect={handlePart} placeholder={tx(lang,'searchPart')}/></div>}
      {isRunning?(<>
        <div className="field"><div className="three-col">
          <div><div className="col-label">{tx(lang,'good')}</div><input type="text" inputMode="numeric" value={good} placeholder="0" onChange={e=>upd('good',onlyDigits(e.target.value))}/></div>
          <div><div className="col-label">{tx(lang,'scrap')}</div><input type="text" inputMode="numeric" value={scrap} placeholder="0" onChange={e=>upd('scrap',onlyDigits(e.target.value))}/></div>
          <div><div className="col-label">{tx(lang,'goal')}</div><input type="text" inputMode="numeric" value={goal} onChange={e=>upd('goal',onlyDigits(e.target.value))}/></div>
        </div></div>
        {hit!==null&&<div className="hit-row"><span className={`hit-pct ${hitCls(hit)}`}>{hit}%</span><span style={{fontSize:12,color:'#aaa'}}>{tx(lang,'hitPct')}</span></div>}
        <div className="divider"/>
        <div className="toggle-row"><span className="toggle-text">⚠ {tx(lang,'hadIssue')}</span><Switch id={`iss-${pressNumber}`} checked={hasIssue} onChange={v=>upd('hasIssue',v)}/></div>
        <div className="field mt-8"><label className="field-label">{tx(lang,'notes')}</label><textarea value={notes} placeholder={tx(lang,'notesHint')} onChange={e=>upd('notes',e.target.value)}/></div>
      </>):(<>
        <div className="field"><label className="field-label">{tx(lang,'reason')}</label><select value={notRunningReason} onChange={e=>upd('notRunningReason',e.target.value)}><option value="">{tx(lang,'selectReason')}</option>{reasons.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
        <div className="field"><label className="field-label">{tx(lang,'notes')}</label><textarea value={notes} placeholder={tx(lang,'notesHint')} onChange={e=>upd('notes',e.target.value)}/></div>
      </>)}

  );
}
function EHPressCard({data,parts,lang,onChange}){
  const{pressNumber,isRunning,notRunningReason,partId,estimatedQty}=data;
  const reasons=NR_REASONS[lang]||NR_REASONS.en;
  const selPart=parts.find(p=>p.id===partId)||null;
  const projEH=selPart&&estimatedQty?((parseInt(estimatedQty,10)||0)*selPart.ehRate):0;
  const upd=(f,v)=>onChange(pressNumber,f,v);
  const handlePart=part=>{upd('partId',part?part.id:'');upd('partNumber',part?part.partNumber:'');upd('partDescription',part?part.description:'');upd('partEhRate',part?part.ehRate:0);};
  const borderColor=!isRunning?'#999':partId?'#28a745':'#f59e0b';
  return(
    <div className="card press-card" style={{borderLeftColor:borderColor,borderLeftWidth:5}}>
      <div className="press-card-top">
        <div className="press-num">{tx(lang,'press')} {pressNumber}</div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {isRunning&&projEH>0&&<span style={{fontWeight:'bold',color:'#1e7e34',fontSize:15}}>{projEH.toFixed(2)}h</span>}
          <div className="nr-toggle-wrap"><span className="nr-toggle-label">{tx(lang,'notRunning')}</span><Switch id={`nreh-${pressNumber}`} checked={!isRunning} onChange={v=>upd('isRunning',!v)}/></div>
        </div>
      </div>
      {isRunning?(<>
        <div className="field"><label className="field-label">{tx(lang,'part')}</label><PartSearch parts={parts} selectedPart={selPart} onSelect={handlePart} placeholder={tx(lang,'searchPart')}/></div>
        {selPart&&<div style={{fontSize:12,color:'#888',marginBottom:10}}>{selPart.description&&<span>{selPart.description} — </span>}<strong>{selPart.ehRate} EH/part</strong></div>}
        <div className="field"><label className="field-label">{tx(lang,'estimatedQty')}</label><input type="text" inputMode="numeric" value={estimatedQty} placeholder="0" onChange={e=>upd('estimatedQty',onlyDigits(e.target.value))}/></div>
      </>):(
        <div className="field"><label className="field-label">{tx(lang,'reason')}</label><select value={notRunningReason} onChange={e=>upd('notRunningReason',e.target.value)}><option value="">{tx(lang,'selectReason')}</option>{reasons.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
      )}
    </div>
  );
}

function EHPredictionView({lang,user,parts,ehGoal,onBack}){
  const isDesktop=useIsDesktop();
  const[date,setDate]=useState(todayStr());
  const[items,setItems]=useState(()=>initEHPressData());
  const[submitting,setSubmitting]=useState(false);const[countdown,setCountdown]=useState(5);
  const[showWarn,setShowWarn]=useState(false);const[missing,setMissing]=useState([]);
  const[submitted,setSubmitted]=useState(false);const[finalData,setFinalData]=useState(null);
  const[finalEH,setFinalEH]=useState(0);const[error,setError]=useState('');
  const timerRef=useRef(null);
  const upd=(pn,f,v)=>setItems(prev=>prev.map(p=>p.pressNumber===pn?{...p,[f]:v}:p));
  const totalEH=items.reduce((s,p)=>s+calcPressEH(p),0);
  const pct=ehGoal>0?Math.round((totalEH/ehGoal)*100):0;
  const ehCol=totalEH>=ehGoal?'#1e7e34':totalEH>=ehGoal*0.8?'#d6820a':'#C8102E';
  const handleClick=()=>{const m=items.filter(p=>p.isRunning&&!p.partId).map(p=>p.pressNumber);if(m.length){setMissing(m);setShowWarn(true);}else startCd();};
  const startCd=()=>{setShowWarn(false);setError('');setCountdown(5);setSubmitting(true);};
  const handleUndo=()=>{clearInterval(timerRef.current);setSubmitting(false);};
  useEffect(()=>{if(!submitting)return;let cnt=5;timerRef.current=setInterval(()=>{cnt-=1;setCountdown(cnt);if(cnt<=0){clearInterval(timerRef.current);doSubmit();}},1000);return()=>clearInterval(timerRef.current);},[submitting]);
  const doSubmit=async()=>{
    const total=items.reduce((s,p)=>s+calcPressEH(p),0);
    try{const r=await gasCall('saveEHPrediction',{date,submittedBy:user.username,pressData:items.map(p=>({...p})),totalEH:total,goalEH:ehGoal});
      if(r.success){setFinalEH(total);setFinalData(items.map(p=>({...p})));setSubmitting(false);setSubmitted(true);}
      else{setSubmitting(false);setError(r.error||tx(lang,'errOccurred'));}
    }catch{setSubmitting(false);setError(tx(lang,'networkErr'));}
  };
  if(submitted){
    const passText=generateEHPassdown(finalData,finalEH,ehGoal,date,user.username);
    const fp=ehGoal>0?Math.round((finalEH/ehGoal)*100):0;const onTrack=finalEH>=ehGoal;
    return(
      <div className="success-panels">
        <div className="success-left">
          <div className="success-icon">{onTrack?'✅':'📊'}</div>
          <div style={{fontSize:22,fontWeight:'bold',color:onTrack?'#1e7e34':'#d6820a'}}>{tx(lang,'predictionSubmitted')}</div>
          <div style={{fontSize:14,color:'#888'}}>Share with your supervisor on Teams</div>
          <div style={{textAlign:'center',marginTop:8}}><div style={{fontSize:42,fontWeight:'bold',color:hitColor(fp)}}>{finalEH.toFixed(1)}h</div><div style={{fontSize:14,color:'#888',marginTop:4}}>of {ehGoal}h goal ({fp}%)</div></div>
          <button className="btn btn-gray" style={{maxWidth:280,width:'100%',marginTop:10}} onClick={onBack}>{tx(lang,'backToMenu')}</button>
        </div>
        <div className="success-right"><div className="passdown-label">Teams Copy / Paste</div><pre className="passdown-pre">{passText}</pre><CopyBtn text={passText} label={tx(lang,'copyToTeams')}/></div>
      </div>
    );
  }
  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="app-header"><div><div className="header-title">{tx(lang,'ehPrediction')}</div><div className="header-sub">{user.username} — {tx(lang,'shift')}</div></div><button className="header-btn" onClick={onBack}>{tx(lang,'back')}</button></div>
      <div className="date-bar"><span className="date-bar-label">{tx(lang,'reportDate')}</span><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}}/></div>
      <div className="scroll-area">
        {error&&<div className="alert alert-error">{error}</div>}
        <div className={isDesktop?'press-grid':''}>{items.map(p=><EHPressCard key={p.pressNumber} data={p} parts={parts} lang={lang} onChange={upd}/>)}</div>
      </div>
      <div className="bottom-bar">
        <div className="eh-total-row"><span className="eh-total-label">{tx(lang,'totalProjEH')}</span><span className="eh-total-value" style={{color:ehCol}}>{totalEH.toFixed(1)}h <span style={{fontSize:14,color:'#aaa',fontWeight:'normal'}}>/ {ehGoal}h</span></span></div>
        <button className="btn btn-red" onClick={handleClick}>{tx(lang,'submitPrediction')}</button>
      </div>
      {submitting&&<UndoOverlay countdown={countdown} lang={lang} onUndo={handleUndo}/>}
      {showWarn&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowWarn(false)}>
        <div className="modal-sheet">
          <div className="modal-title">⚠ {tx(lang,'missingPartsWarning')}</div>
          {missing.map(pn=><div key={pn} style={{padding:'6px 0',borderBottom:'1px solid #f3f3f3',fontWeight:'bold',fontSize:14}}>Press {pn}</div>)}
          <div style={{fontSize:14,color:'#888',margin:'14px 0'}}>{tx(lang,'missingPartsSure')}</div>
          <div className="modal-footer"><button className="btn btn-gray" style={{flex:1}} onClick={()=>setShowWarn(false)}>{tx(lang,'cancel')}</button><button className="btn btn-red" style={{flex:1}} onClick={startCd}>{tx(lang,'submitPrediction')}</button></div>
        </div>
      </div>}
    </div>
  );
}

function ProductionReportView({lang,user,operators,goals,parts,lastReport,onBack}){
  const isDesktop=useIsDesktop();
  const[date,setDate]=useState(todayStr());
  const[items,setItems]=useState(()=>initPressData(goals,lastReport));
  const[submitting,setSubmitting]=useState(false);const[countdown,setCountdown]=useState(5);
  const[submitted,setSubmitted]=useState(false);const[subData,setSubData]=useState(null);
  const[overallHit,setOverallHit]=useState(null);const[error,setError]=useState('');
  const timerRef=useRef(null);const payloadRef=useRef(null);
  const handleChange=(pn,f,v)=>setItems(prev=>prev.map(p=>p.pressNumber===pn?{...p,[f]:v}:p));
  const handleSubmit=()=>{
    const run=items.filter(p=>p.isRunning);
    const tG=run.reduce((s,p)=>s+(parseInt(p.good,10)||0),0),tGl=run.reduce((s,p)=>s+(parseInt(p.goal,10)||0),0);
    payloadRef.current={date,submittedBy:user.username,pressData:items.map(p=>({...p}))};
    setOverallHit(tGl>0?Math.round((tG/tGl)*100):null);setError('');setCountdown(5);setSubmitting(true);
  };
  useEffect(()=>{if(!submitting)return;let cnt=5;timerRef.current=setInterval(()=>{cnt-=1;setCountdown(cnt);if(cnt<=0){clearInterval(timerRef.current);doSubmit();}},1000);return()=>clearInterval(timerRef.current);},[submitting]);
  const handleUndo=()=>{clearInterval(timerRef.current);setSubmitting(false);};
  const doSubmit=async()=>{const pl=payloadRef.current;try{const r=await gasCall('submitReport',pl);if(r.success){setSubData(pl.pressData);setSubmitting(false);setSubmitted(true);}else{setSubmitting(false);setError(r.error||tx(lang,'errOccurred'));}}catch{setSubmitting(false);setError(tx(lang,'networkErr'));}};
  if(submitted){
    const pt=generatePassdown(subData||[]);
    return(
      <div className="success-panels">
        <div className="success-left">
          <div className="success-icon">✅</div>
          <div style={{fontSize:22,fontWeight:'bold',color:'#1e7e34'}}>{tx(lang,'submitted')}</div>
          <div style={{fontSize:14,color:'#888'}}>{tx(lang,'submittedSub')}</div>
          {overallHit!==null&&overallHit>=90&&<div style={{background:'#e8f5e9',border:'1.5px solid #a5d6a7',borderRadius:8,padding:'12px 16px'}}><div style={{fontSize:15,fontWeight:'bold',color:'#1e7e34'}}>🏆 {tx(lang,'congrats')} {user.username}!</div><div style={{fontSize:13,color:'#2e7d32',marginTop:3}}>{tx(lang,'congratsSub')} {overallHit}%</div></div>}
          <button className="btn btn-gray" style={{maxWidth:280,width:'100%',marginTop:10}} onClick={onBack}>{tx(lang,'backToMenu')}</button>
        </div>
        <div className="success-right"><div className="passdown-label">{tx(lang,'passdown')}</div><pre className="passdown-pre">{pt}</pre><CopyBtn text={pt} label={tx(lang,'copyPassdown')}/></div>
      </div>
    );
  }
  return(
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <div className="app-header"><div><div className="header-title">{tx(lang,'productionReport')}</div><div className="header-sub">{tx(lang,'shift')} — {user.username}</div></div><button className="header-btn" onClick={onBack}>{tx(lang,'back')}</button></div>
      <div className="date-bar"><span className="date-bar-label">{tx(lang,'reportDate')}</span><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}}/></div>
      <div className="scroll-area">
        {error&&<div className="alert alert-error">{error}</div>}
        <div className={isDesktop?'press-grid':''}>{items.map(p=><PressCard key={p.pressNumber} data={p} operators={operators} parts={parts} lang={lang} onChange={handleChange}/>)}</div>
      </div>
      <div className="bottom-bar"><button className="btn btn-red" onClick={handleSubmit}>{tx(lang,'submitReport')}</button></div>
      {submitting&&<UndoOverlay countdown={countdown} lang={lang} onUndo={handleUndo}/>}
    </div>
  );
}
function LeadView({lang,user,operators,goals,parts,ehGoal,lastReport,onLogout}){
  const[mode,setMode]=useState('home');
  if(mode==='home')       return <LeadHomeScreen lang={lang} user={user} parts={parts} onSelect={setMode} onLogout={onLogout}/>;
  if(mode==='prediction') return <EHPredictionView lang={lang} user={user} parts={parts} ehGoal={ehGoal} onBack={()=>setMode('home')}/>;
  if(mode==='report')     return <ProductionReportView lang={lang} user={user} operators={operators} goals={goals} parts={parts} lastReport={lastReport} onBack={()=>setMode('home')}/>;

}

  const best=dayR[0],worst=dayR[dayR.length-1];
  return(<>
    {concerns.length>0&&<div className="alert-section alert-section-concern"><div className="alert-section-title" style={{color:'#C8102E'}}>⚠ {tx(lang,'concernFlag')} — below 75%</div><div className="alert-names" style={{color:'#C8102E'}}>{concerns.map(o=>o.name).join(', ')}</div></div>}
    {onFire.length>0&&<div className="alert-section alert-section-fire"><div className="alert-section-title" style={{color:'#1e7e34'}}>🏆 {tx(lang,'onFireFlag')} — 95%+ three nights in a row</div><div className="alert-names" style={{color:'#1e7e34'}}>{onFire.map(o=>o.name).join(', ')}</div></div>}
    {pf}
    <div className="stat-row"><div className="stat-card"><div className="stat-big" style={{color:hitColor(overall)}}>{overall}%</div><div className="stat-label">{tx(lang,'overallHit')}</div></div><div className="stat-card"><div className="stat-big">{tG.toLocaleString()}</div><div className="stat-label">{tx(lang,'totalGood')}</div></div><div className="stat-card"><div className="stat-big">{reports.length}</div><div className="stat-label">{tx(lang,'reports')}</div></div></div>
    {dayR.length>1&&<div className="stat-row"><div className="stat-card"><div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:4}}>🏆 {tx(lang,'bestDay')}</div><div style={{fontSize:22,fontWeight:'bold',color:'#1e7e34'}}>{best.hit}%</div><div style={{fontSize:12,color:'#555',marginTop:2}}>{formatDate(best.date)}</div></div><div className="stat-card"><div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:4}}>📉 {tx(lang,'worstDay')}</div><div style={{fontSize:22,fontWeight:'bold',color:'#C8102E'}}>{worst.hit}%</div><div style={{fontSize:12,color:'#555',marginTop:2}}>{formatDate(worst.date)}</div></div></div>}
    <div className="section-head">{tx(lang,'prodVsGoal')}</div><div className="card"><PressBarChart reports={reports}/></div>
    {dayR.length>0&&<><div className="section-head">{tx(lang,'dailyPerf')}</div><div className="card">{[...dayR].sort((a,b)=>a.date.localeCompare(b.date)).map(({date,hit})=><div key={date} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}><div style={{width:56,fontSize:11,color:'#888',flexShrink:0}}>{formatDate(date)}</div><div style={{flex:1,background:'#f0f0f0',borderRadius:4,height:18,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(hit,100)}%`,background:hitColor(hit),borderRadius:4}}></div></div><div style={{width:38,fontSize:12,fontWeight:'bold',color:hitColor(hit),textAlign:'right'}}>{hit}%</div></div>)}</div></>}
    <div className={isDesktop?'scorecard-cols':''}>
      <div className="card" style={{marginBottom:11}}><div className="section-head">{tx(lang,'opScorecard')}</div>{opR.map(o=><div key={o.name} className="scorecard-row"><div className="scorecard-name">{o.name}{concerns.find(c=>c.name===o.name)&&<span style={{color:'#C8102E',marginLeft:6,fontSize:11}}>⚠</span>}{onFire.find(c=>c.name===o.name)&&<span style={{marginLeft:6,fontSize:11}}>🏆</span>}</div><div className="scorecard-bar-wrap"><div className="scorecard-bar" style={{width:`${Math.min(o.hit,100)}%`,background:hitColor(o.hit)}}></div></div><div className="scorecard-pct" style={{color:hitColor(o.hit)}}>{o.hit}%</div></div>)}</div>
      <div className="card" style={{marginBottom:11}}><div className="section-head">{tx(lang,'pressPerf')}</div>{prR.map(p=><div key={p.press} className="scorecard-row"><div className="scorecard-name">{tx(lang,'press')} {p.press}</div><div className="scorecard-bar-wrap"><div className="scorecard-bar" style={{width:`${Math.min(p.hit,100)}%`,background:hitColor(p.hit)}}></div></div><div className="scorecard-pct" style={{color:hitColor(p.hit)}}>{p.hit}%</div></div>)}</div>
    </div>
  </>);
}

// ── Manager View ──────────────────────────────────────────────
function ManagerView({lang,user,operators,setOperators,goals,setGoals,parts,setParts,settings,setSettings,onLogout,onOpenSubmit}){
  const[tab,setTab]=useState('overview');
  const[users,setUsers]=useState([]);const[reports,setReports]=useState([]);
  const[archived,setArchived]=useState([]);const[showArchived,setShowArchived]=useState(false);
  const[ehPreds,setEHPreds]=useState([]);const[selPred,setSelPred]=useState(null);
  const[loading,setLoading]=useState(false);const[modal,setModal]=useState(null);
  const[selReport,setSelReport]=useState(null);
  const[localGoals,setLocalGoals]=useState({...goals});const[goalMsg,setGoalMsg]=useState('');
  const[ehGoalInput,setEHGoalInput]=useState(String(settings.ehGoal||47.5));
  const isDesktop=useIsDesktop();
  useEffect(()=>{
    if(tab==='users')loadUsers();else if(tab==='reports')loadReports();
    else if(tab==='goals'){setLocalGoals({...goals});setEHGoalInput(String(settings.ehGoal||47.5));}
    else if(tab==='parts')loadParts();else if(tab==='eh')loadEHPreds();
  },[tab]);
  const loadUsers=async()=>{setLoading(true);try{const r=await gasCall('getUsers');if(r.success)setUsers(r.users);}catch{}setLoading(false);};
  const loadReports=async()=>{setLoading(true);try{const r=await gasCall('getReports');if(r.success)setReports(r.reports);}catch{}setLoading(false);};
  const loadArchived=async()=>{try{const r=await gasCall('getArchivedReports');if(r.success)setArchived(r.reports);}catch{}};
  const loadParts=async()=>{setLoading(true);try{const r=await gasCall('getParts');if(r.success)setParts(r.parts);}catch{}setLoading(false);};
  const loadEHPreds=async()=>{setLoading(true);try{const r=await gasCall('getEHPredictions');if(r.success)setEHPreds(r.predictions);}catch{}setLoading(false);};
  const refreshOps=async()=>{try{const r=await gasCall('getOperators');if(r.success)setOperators(r.operators);}catch{}};
  const delUser=async id=>{if(!window.confirm(tx(lang,'confirmDel')))return;await gasCall('deleteUser',{id});loadUsers();};
  const delOp=async id=>{if(!window.confirm(tx(lang,'confirmDel')))return;await gasCall('deleteOperator',{id});refreshOps();};
  const delPart=async id=>{if(!window.confirm(tx(lang,'confirmDel')))return;await gasCall('deletePart',{id});loadParts();};
  const saveGoals=async()=>{const arr=PRESSES.map(p=>({press:p,goal:parseInt(localGoals[p],10)||0}));const r=await gasCall('updateGoals',{goals:arr});if(r.success){const u={};PRESSES.forEach(p=>{u[p]=parseInt(localGoals[p],10)||0;});setGoals(u);setGoalMsg(tx(lang,'goalsSaved'));setTimeout(()=>setGoalMsg(''),3000);}};
  const saveEHGoal=async()=>{const val=parseFloat(ehGoalInput)||47.5;const r=await gasCall('saveSetting',{key:'ehGoal',value:val});if(r.success){setSettings(prev=>({...prev,ehGoal:val}));setGoalMsg(tx(lang,'ehGoalSaved'));setTimeout(()=>setGoalMsg(''),3000);}};
  const handleArchive=id=>{setSelReport(null);setReports(prev=>prev.filter(r=>r.id!==id));};
  const handleRestore=async id=>{await gasCall('archiveReport',{reportId:id,restore:true});setArchived(prev=>prev.filter(r=>r.id!==id));};
  const toggleArchived=()=>{if(!showArchived)loadArchived();setShowArchived(v=>!v);};
  if(selReport)return <ReportDetail report={selReport} lang={lang} onBack={()=>setSelReport(null)} onArchive={handleArchive}/>;
  if(selPred)return <EHPredictionDetail prediction={selPred} parts={parts} lang={lang} ehGoal={settings.ehGoal||47.5} onBack={()=>setSelPred(null)}/>;
  const tabs=['overview','molders','submit','users','operators','goals','parts','eh','reports'];
  const renderContent=()=>{
    if(loading)return <div className="loading-msg">{tx(lang,'loading')}</div>;
    if(tab==='overview')return <OverviewTab lang={lang} operators={operators}/>;
    if(tab==='molders') return <MolderProfilesTab lang={lang} operators={operators} user={user}/>;
    if(tab==='submit')  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',padding:'40px 20px',gap:10}}><div style={{fontSize:40}}>📋</div><div style={{fontSize:16,fontWeight:'bold'}}>{tx(lang,'openForm')}</div><div style={{fontSize:14,color:'#888'}}>{tx(lang,'openFormDesc')}</div><button className="btn btn-red" style={{maxWidth:280,width:'100%',margin:'8px auto 0'}} onClick={onOpenSubmit}>{tx(lang,'openForm')}</button></div>;
    if(tab==='users')   return <><button className="btn btn-red" style={{marginBottom:12}} onClick={()=>setModal({type:'user',item:null})}>+ {tx(lang,'addUser')}</button><div className="card">{users.length===0&&<div className="empty-msg">{tx(lang,'noUsers')}</div>}{users.map(u=><div key={u.id} className="list-row"><div><div className="list-row-main">{u.username}</div><div className="list-row-sub">{u.role==='manager'?tx(lang,'managerRole'):tx(lang,'lead')}{u.email?` — ${u.email}`:''}</div></div><div className="list-row-actions"><button className="btn-sm btn-sm-gray" onClick={()=>setModal({type:'user',item:u})}>{tx(lang,'edit')}</button><button className="btn-sm btn-sm-danger" onClick={()=>delUser(u.id)}>{tx(lang,'delete')}</button></div></div>)}</div></>;
    if(tab==='operators')return <><button className="btn btn-red" style={{marginBottom:12}} onClick={()=>setModal({type:'operator',item:null})}>+ {tx(lang,'addOp')}</button><div className="card">{operators.length===0&&<div className="empty-msg">{tx(lang,'noOps')}</div>}{operators.map(op=><div key={op.id} className="list-row"><div><div className="list-row-main">{op.name}</div><div className="list-row-sub">{tx(lang,'stampNo')}: {op.stampNumber}</div></div><div className="list-row-actions"><button className="btn-sm btn-sm-gray" onClick={()=>setModal({type:'operator',item:op})}>{tx(lang,'edit')}</button><button className="btn-sm btn-sm-danger" onClick={()=>delOp(op.id)}>{tx(lang,'delete')}</button></div></div>)}</div></>;
    if(tab==='parts')   return <><button className="btn btn-red" style={{marginBottom:12}} onClick={()=>setModal({type:'part',item:null})}>+ {tx(lang,'addPart')}</button><div className="card">{parts.length===0&&<div className="empty-msg">{tx(lang,'noParts')}</div>}{parts.map(p=><div key={p.id} className="list-row"><div><div className="list-row-main">{p.partNumber}</div><div className="list-row-sub">{p.description&&<span>{p.description} — </span>}{p.ehRate} EH/part</div></div><div className="list-row-actions"><button className="btn-sm btn-sm-gray" onClick={()=>setModal({type:'part',item:p})}>{tx(lang,'edit')}</button><button className="btn-sm btn-sm-danger" onClick={()=>delPart(p.id)}>{tx(lang,'delete')}</button></div></div>)}</div></>;
    if(tab==='eh')      return <>{ehPreds.length===0&&<div className="empty-msg" style={{padding:24}}>{tx(lang,'noEHPredictions')}</div>}{ehPreds.map(pred=>{const pct=pred.goalEH>0?Math.round((pred.totalEH/pred.goalEH)*100):0;return <div key={pred.id} className="card report-card" onClick={()=>setSelPred(pred)}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:'bold',fontSize:16}}>{formatDate(pred.date)}</div><div className="report-meta">{pred.submittedBy} · {formatDateTime(pred.timestamp)}</div></div><div style={{textAlign:'right'}}><div style={{fontSize:20,fontWeight:'bold',color:hitColor(pct)}}>{pred.totalEH.toFixed(1)}h</div><div style={{fontSize:12,color:'#888'}}>of {pred.goalEH}h ({pct}%)</div></div></div></div>;})}</>;
    if(tab==='goals')   return <>{goalMsg&&<div className="alert alert-success">{goalMsg}</div>}
      <div className="section-head" style={{marginBottom:8}}>{tx(lang,'ehGoalLabel')}</div>
      <div className="card" style={{marginBottom:14}}><div className="goal-row" style={{borderBottom:'none',paddingBottom:0}}><div className="goal-label">{tx(lang,'ehGoalLabel')}</div><input className="goal-input" type="text" inputMode="decimal" value={ehGoalInput} onChange={e=>setEHGoalInput(e.target.value)}/></div><button className="btn btn-outline mt-8" onClick={saveEHGoal}>{tx(lang,'saveEHGoal')}</button></div>
      <div className="section-head">{tx(lang,'defaultGoals')}</div>
      <div className="card">{PRESSES.map(p=><div key={p} className="goal-row"><div className="goal-label">{tx(lang,'press')} {p}</div><input className="goal-input" type="text" inputMode="numeric" value={localGoals[p]!=null?localGoals[p]:''} onChange={e=>setLocalGoals(prev=>({...prev,[p]:onlyDigits(e.target.value)})}/></div>)}</div>
      <button className="btn btn-red mt-12" onClick={saveGoals}>{tx(lang,'saveGoals')}</button></>;
    if(tab==='reports') return <>{reports.length===0&&<div className="empty-msg" style={{padding:24}}>{tx(lang,'noReports')}</div>}
      {reports.map(r=>{const iss=(r.pressData||[]).filter(p=>p.hasIssue).length,stop=(r.pressData||[]).filter(p=>!p.isRunning).length;return <div key={r.id} className="card report-card" onClick={()=>setSelReport(r)}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:'bold',fontSize:16}}>{formatDate(r.date)}</div><div className="report-meta">{r.submittedBy} · {formatDateTime(r.timestamp)}</div></div><span style={{color:'#C8102E',fontSize:22,fontWeight:'bold'}}>›</span></div>{(iss>0||stop>0)&&<div className="report-flags">{iss>0&&<span className="flag flag-issue">⚠ {iss} {iss===1?'issue':'issues'}</span>}{stop>0&&<span className="flag flag-stopped">● {stop} not running</span>}</div>}</div>;})}
      <div className="archived-toggle" onClick={toggleArchived}><span className="archived-toggle-label">📦 {tx(lang,'archivedReports')}</span><span style={{fontSize:14,color:'#aaa'}}>{showArchived?'▲':'▼'}</span></div>
      {showArchived&&<div>{archived.length===0&&<div className="empty-msg" style={{padding:16}}>{tx(lang,'noArchived')}</div>}{archived.map(r=><div key={r.id} className="card" style={{opacity:0.75}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontWeight:'bold',fontSize:15}}>{formatDate(r.date)}</div><div className="report-meta">{r.submittedBy} · {formatDateTime(r.timestamp)}</div></div><button className="btn-sm btn-sm-green" onClick={()=>handleRestore(r.id)}>{tx(lang,'restore')}</button></div></div>)}</div>}
    </>;
    return null;
  };
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div className="app-header"><div><div className="header-title">nVent | {tx(lang,'manager')}</div><div className="header-sub">{user.username}</div></div><button className="header-btn" onClick={onLogout}>{tx(lang,'logout')}</button></div>
      {!isDesktop&&<div className="tabs">{tabs.map(tk=><div key={tk} className={`tab${tab===tk?' active':''}`} onClick={()=>setTab(tk)}>{tx(lang,tk)||tk}</div>)}</div>}
      <div className="mgr-body">
        {isDesktop&&<div className="mgr-sidebar">{tabs.map(tk=><button key={tk} className={`mgr-sidebar-btn${tab===tk?' active':''}`} onClick={()=>setTab(tk)}>{tx(lang,tk)||tk}</button>)}</div>}
        <div className="mgr-content">{renderContent()}</div>
      </div>
      {modal?.type==='user'    &&<UserModal lang={lang} item={modal.item} onSave={()=>{setModal(null);loadUsers();}} onClose={()=>setModal(null)}/>}
      {modal?.type==='operator'&&<OperatorModal lang={lang} item={modal.item} onSave={()=>{setModal(null);refreshOps();}} onClose={()=>setModal(null)}/>}
      {modal?.type==='part'    &&<PartModal lang={lang} item={modal.item} onSave={()=>{setModal(null);loadParts();}} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState(()=>localStorage.getItem('moldingLang')||null);
  const[screen,setScreen]=useState(()=>localStorage.getItem('moldingLang')?'login':'language');
  const[user,setUser]=useState(null);const[operators,setOperators]=useState([]);
  const[goals,setGoals]=useState({...DEFAULT_GOALS});const[lastReport,setLastReport]=useState(null);
  const[parts,setParts]=useState([]);const[settings,setSettings]=useState({ehGoal:47.5});
  const[loginError,setLoginError]=useState('');const[loginLoading,setLoginLoading]=useState(false);const[appLoading,setAppLoading]=useState(false);
  const selectLang=l=>{localStorage.setItem('moldingLang',l);setLang(l);setScreen('login');};
  const toggleLang=()=>{const nl=lang==='en'?'es':'en';localStorage.setItem('moldingLang',nl);setLang(nl);setLoginError('');};
  const handleLogin=async(username,password)=>{
    setLoginError('');setLoginLoading(true);
    try{const result=await gasCall('login',{username,password});
      if(result.success){setUser(result.user);setLoginLoading(false);setAppLoading(true);
        const[opR,goR,lrR,prR,stR]=await Promise.all([gasCall('getOperators'),gasCall('getGoals'),gasCall('getLastReport'),gasCall('getParts'),gasCall('getSettings')]);
        if(opR.success)setOperators(opR.operators);
        if(goR.success)setGoals(prev=>{const m={...prev};Object.keys(goR.goals).forEach(k=>{m[parseInt(k,10)]=parseInt(goR.goals[k],10);});return m;});
        if(lrR.success)setLastReport(lrR.report);
        if(prR.success)setParts(prR.parts);
        if(stR.success)setSettings(stR.settings);
        setAppLoading(false);setScreen(result.user.role==='manager'?'manager':'lead');
      }else{setLoginError(tx(lang||'en','invalidCreds'));setLoginLoading(false);}
    }catch{setLoginError(tx(lang||'en','networkErr'));setLoginLoading(false);}
  };
  const handleLogout=()=>{setUser(null);setLoginError('');setScreen('login');};
  if(appLoading)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'white'}}><div style={{textAlign:'center',color:'#aaa'}}><div style={{width:36,height:4,background:'#C8102E',margin:'0 auto 16px',borderRadius:2}}></div>{tx(lang||'en','loading')}</div></div>;
  return(
    <div className="app-wrap">
      {screen==='language'      &&<LanguageScreen onSelect={selectLang}/>}
      {screen==='login'         &&<LoginScreen lang={lang||'en'} onLogin={handleLogin} onLangToggle={toggleLang} loading={loginLoading} error={loginError}/>}
      {screen==='lead'          &&user&&<LeadView lang={lang} user={user} operators={operators} goals={goals} parts={parts} ehGoal={settings.ehGoal||47.5} lastReport={lastReport} onLogout={handleLogout}/>}
      {screen==='manager'       &&user&&<ManagerView lang={lang} user={user} operators={operators} setOperators={setOperators} goals={goals} setGoals={setGoals} parts={parts} setParts={setParts} settings={settings} setSettings={setSettings} onLogout={handleLogout} onOpenSubmit={()=>setScreen('managerSubmit')}/>}
      {screen==='managerSubmit' &&user&&<ProductionReportView lang={lang} user={user} operators={operators} goals={goals} parts={parts} lastReport={lastReport} onBack={()=>setScreen('manager')}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
